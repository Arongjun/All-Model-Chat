services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      PORT: 3001
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_API_BASE: ${GEMINI_API_BASE:-https://generativelanguage.googleapis.com}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_API_BASE: ${OPENAI_API_BASE:-https://api.openai.com/v1}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_API_BASE: ${ANTHROPIC_API_BASE:-https://api.anthropic.com}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-}
      WORKSPACE_DATABASE_FILE: ${WORKSPACE_DATABASE_FILE:-server/data/arong-workspace.sqlite}
      WORKSPACE_LEGACY_JSON_FILE: ${WORKSPACE_LEGACY_JSON_FILE:-server/data/arong-workspace.json}
      WORKSPACE_SESSION_TTL_HOURS: ${WORKSPACE_SESSION_TTL_HOURS:-336}
    volumes:
      - workspace-data:/app/server/data
    expose:
      - "3001"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3001/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    depends_on:
      api:
        condition: service_healthy
    environment:
      RUNTIME_SERVER_MANAGED_API: ${RUNTIME_SERVER_MANAGED_API:-true}
      RUNTIME_USE_CUSTOM_API_CONFIG: ${RUNTIME_USE_CUSTOM_API_CONFIG:-true}
      RUNTIME_USE_API_PROXY: ${RUNTIME_USE_API_PROXY:-true}
      RUNTIME_API_PROXY_URL: ${RUNTIME_API_PROXY_URL:-/api/gemini}
      RUNTIME_OPENAI_API_BASE: ${RUNTIME_OPENAI_API_BASE:-}
      RUNTIME_ANTHROPIC_API_BASE: ${RUNTIME_ANTHROPIC_API_BASE:-}
      RUNTIME_LIVE_API_EPHEMERAL_TOKEN_ENDPOINT: ${RUNTIME_LIVE_API_EPHEMERAL_TOKEN_ENDPOINT:-/api/live-token}
    ports:
      - "${WEB_PORT:-28080}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/runtime-config.js >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

volumes:
  workspace-data:
